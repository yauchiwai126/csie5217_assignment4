version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:80" # Nginx exposed on port 8080
    volumes:
      - ./backend:/app
      - ./backend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-django

  backend-django:
    build:
      context: ./backend
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ./backend:/app
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:8001" # Django frontend exposed on port 3000
    volumes:
      - ./frontend:/app